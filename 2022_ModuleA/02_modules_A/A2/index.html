<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XX_A2 - Vectored Icons</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    gap: 28px;
  }
</style>
</head>

    <polyline points="22,35 50,58 78,35" fill="none" stroke="#B22FCC" stroke-width="6" stroke-linejoin="round"/>
  </svg>

  <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

  <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

    <polygon points="32,22 32,78 56,64 64,82 74,78 66,60 82,52" fill="#00B050"/>

  <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

    <circle cx="50" cy="50" r="45" fill="none" stroke="#E0151F" stroke-width="8"/>
    <path d="M50,20 C37,20 27,30 27,43 C27,57 50,80 50,80 C50,80 73,57 73,43 C73,30 63,20 50,20 Z" fill="#E0151F"/>
