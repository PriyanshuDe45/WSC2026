<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>South Korean Flag</title>
 <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="flag">

    
    <div class="taeguk">
      <div class="bump-red"></div>
      <div class="bump-blue"></div>
    </div>

   
    <div class="trigram geon">
      <div class="bar solid"><div class="bar-piece"></div></div>
      <div class="bar solid"><div class="bar-piece"></div></div>
      <div class="bar solid"><div class="bar-piece"></div></div>
    </div>

    
    <div class="trigram gam">
      <div class="bar broken">
        <div class="bar-piece"></div><div class="bar-piece"></div>
      </div>
      <div class="bar solid"><div class="bar-piece"></div></div>
      <div class="bar broken">
        <div class="bar-piece"></div><div class="bar-piece"></div>
      </div>
    </div>

   
    <div class="trigram li">
      <div class="bar solid"><div class="bar-piece"></div></div>
      <div class="bar broken">
        <div class="bar-piece"></div><div class="bar-piece"></div>
      </div>
      <div class="bar solid"><div class="bar-piece"></div></div>
    </div>

    
    <div class="trigram gon">
      <div class="bar broken">
        <div class="bar-piece"></div><div class="bar-piece"></div>
      </div>
      <div class="bar broken">
        <div class="bar-piece"></div><div class="bar-piece"></div>
      </div>
      <div class="bar broken">
        <div class="bar-piece"></div><div class="bar-piece"></div>
      </div>
    </div>

  </div>
</body>
</html>
