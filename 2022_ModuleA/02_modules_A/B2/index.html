<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TODO List</title>
  <style>
    input:checked + label {
      text-decoration: line-through;
    }
  </style>
</head>
<body>
 <h1>Todo List</h1>
  <ul style="list-style:none">
    <li><input type="checkbox" id="t1"> <label for="t1">Buy groceries</label></li>
    <li><input type="checkbox" id="t2"> <label for="t2">Read a book</label></li>
    <li><input type="checkbox" id="t3"> <label for="t3">Go for a morning run</label></li>
    <li><input type="checkbox" id="t4"> <label for="t4">Complete the project report</label></li>
    <li><input type="checkbox" id="t5"> <label for="t5">Call the dentist</label></li>
  </ul>

</body>
</html>
